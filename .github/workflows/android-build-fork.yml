name: Android Build (Fork)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-build-fork.yml'
      - 'apps/android/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  android-debug-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: play
            gradle_task: :app:assemblePlayDebug
            artifact_name: openclaw-android-play-debug-apk
            artifact_path: apps/android/app/build/outputs/apk/play/debug/*.apk
          - flavor: thirdparty
            gradle_task: :app:assembleThirdPartyDebug
            artifact_name: openclaw-android-thirdparty-debug-apk
            artifact_path: apps/android/app/build/outputs/apk/thirdParty/debug/*.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses + install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build ${{ matrix.flavor }} debug APK
        working-directory: apps/android
        run: ./gradlew --no-daemon ${{ matrix.gradle_task }}

      - name: Upload ${{ matrix.flavor }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
