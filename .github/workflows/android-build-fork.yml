name: Android Build (Fork)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-build-fork.yml'
      - 'apps/android/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  android-debug-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses + install packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assemblePlayDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-play-debug-apk
          path: apps/android/app/build/outputs/apk/play/debug/*.apk
          if-no-files-found: error
